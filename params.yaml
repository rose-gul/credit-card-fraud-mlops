# Central hyperparameters & pipeline configuration.
# Consumed by src/fraud_scoring/config.py and by kaggle/train_kernel.py.

seed: 42

data:
  kaggle_dataset: "mlg-ulb/creditcardfraud"
  raw_csv: "creditcard.csv"
  target: "Class"                # 1 = fraud, 0 = legit
  test_size: 0.2
  # Columns that get standard-scaled (the PCA V1..V28 are already ~standardized)
  scale_cols: ["Amount", "Time"]

features:
  # engineered feature toggles
  log_amount: true
  hour_of_day: true              # derived from Time (seconds since first txn)
  amount_zscore: true

xgboost:
  n_estimators: 600
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 2
  reg_lambda: 1.0
  tree_method: "hist"            # GPU: device="cuda" set at runtime on Kaggle
  eval_metric: "aucpr"
  # scale_pos_weight computed at runtime = n_neg / n_pos

torch:
  hidden_dims: [128, 64, 32]
  dropout: 0.3
  lr: 0.001
  weight_decay: 0.00001
  batch_size: 2048
  epochs: 25
  pos_weight_cap: 50.0           # cap on class-imbalance weighting for stability

thresholds:
  # decision bands applied by the runtime review-agent
  approve_below: 0.30            # score < 0.30  -> APPROVE
  block_above: 0.85             # score >= 0.85 -> BLOCK ; between -> REVIEW
  high_amount_review: 5000.0     # rule: large amounts force at least REVIEW

monitoring:
  psi_warn: 0.10                 # population-stability index warning band
  psi_alert: 0.25                # PSI alert band

mlflow:
  experiment_name: "fraud-scoring"
  registered_model_name: "fraud-scorer"

kaggle_kernel:
  # slug is <username>/<kernel-name>; username filled from kaggle.json at runtime
  kernel_name: "fraud-scoring-gpu-train"
  enable_gpu: true
  enable_internet: true
  poll_interval_sec: 30
  poll_timeout_sec: 3600
